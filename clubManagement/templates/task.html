{% load static tailwind_tags %}
<!doctype html>
<html lang="en">
  <head>
    <title>Tasks</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% tailwind_css %}

    <!-- Icons (Heroicons CDN) -->
    <script src="https://unpkg.com/heroicons@2.0.18/dist/heroicons.js"></script>
  </head>

  <body class="bg-gray-100">
    <div class="flex h-screen">
      <!-- SIDEBAR -->
      <div class="w-64 bg-gray-900 text-white flex flex-col">
        <!-- LOGO / TITLE -->
        <div class="p-6 border-b border-gray-700">
          <h1 class="text-xl font-bold">OrgFlow</h1>
          <p class="text-lg text-gray-400">
            Hi, {{ request.user.first_name }}!
          </p>
        </div>

        <!-- NAVIGATION -->
        <nav class="flex-1 p-4 space-y-2">
          <!-- Dashboard -->
          <a
            href="{% url 'dashboard' %}"
            class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"
              />
            </svg>
            Dashboard
          </a>

          <!-- Organizations -->
          <a
            href="{% url 'organizations' %}"
            class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 20h5V4H2v16h5m10 0v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6m10 0H7"
              />
            </svg>
            Organizations
          </a>

          <!-- Tasks -->
          <a
            href="{% url 'tasks' %}"
            class="flex items-center gap-3 px-4 py-2 rounded-lg bg-gray-800"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5h6M9 9h6M9 13h6M9 17h6"
              />
            </svg>
            Tasks
          </a>
        </nav>

        <!-- LOGOUT -->
        <div class="p-4 border-t border-gray-700">
          <a
            href="{% url 'logout' %}"
            class="block text-center bg-red-500 py-2 rounded-lg hover:bg-red-600"
          >
            Logout
          </a>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="flex-1 p-8">
        <h1 class="text-3xl font-bold mb-6">Tasks</h1>

        <div class="bg-white p-6 rounded-lg shadow">
          <p class="text-gray-600">Your tasks will appear here.</p>
        </div>
      </div>
    </div>
  </body>
</html>
