{% extends 'base.html' %}

{% block title %}Tasks{% endblock %}

{% block content %}
{% if not organizations %}
<div class="flex items-center justify-center h-full">
  <div class="text-center">
    <div class="mb-6 text-gray-400 text-5xl">🏢</div>
    <h1 class="text-2xl font-semibold text-gray-800 mb-2">
      No organizations joined yet!
    </h1>
    <p class="text-gray-500 mb-6">
      Create one or join one to get started.
    </p>
    <a href="{% url 'organizations' %}" class="px-5 py-2 rounded bg-gray-900 text-white hover:bg-black">
      Go to Organizations
    </a>
  </div>
</div>
{% else %}
<div class="p-8">
  <h1 class="text-3xl font-bold mb-6">Tasks</h1>
  <div class="bg-white p-6 rounded-lg shadow">
    <p class="text-gray-600">Your tasks will appear here.</p>
  </div>
</div>
{% endif %}
{% endblock %}
