{% load static %}
<!doctype html>
<html lang="en">
<head>
  <title>Sign Up — OrgFlow</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body class="flex min-h-screen bg-[#0f0f0f] font-[DM_Sans] overflow-hidden">

<!-- LEFT SAME AS LOGIN (reuse exactly) -->
<div class="w-[55%] relative flex flex-col justify-center p-[60px]
    bg-gradient-to-br from-[#0f1923] via-[#0d2137] to-[#0a1a2e] overflow-hidden">

  <div class="absolute inset-0 
    bg-[linear-gradient(rgba(56,189,248,0.04)_1px,transparent_1px),linear-gradient(90deg,rgba(56,189,248,0.04)_1px,transparent_1px)]
    bg-[size:48px_48px]"></div>

  <div class="absolute -top-[200px] -left-[200px] w-[600px] h-[600px]
    bg-[radial-gradient(circle,rgba(56,189,248,0.12)_0%,transparent_70%)]"></div>

  <div class="absolute -bottom-[150px] -right-[100px] w-[500px] h-[500px]
    bg-[radial-gradient(circle,rgba(20,184,166,0.1)_0%,transparent_70%)]"></div>

  <div class="relative z-10 flex items-center gap-3 mb-14">
    <img src="{% static 'logo_navbar.png' %}" class="h-11">
    <span class="font-[Syne] text-xl font-extrabold text-white">OrgFlow</span>
  </div>

  <h2 class="font-[Syne] text-[3.2rem] font-extrabold text-white leading-tight">
    Join your<br>
    <span class="bg-gradient-to-r from-sky-400 to-teal-400 bg-clip-text text-transparent">organization</span><br>
    today.
  </h2>

</div>

<!-- RIGHT PANEL -->
<div class="w-[45%] bg-white flex flex-col justify-center px-14 py-12 overflow-y-auto">

  <div class="mb-7">
    <h1 class="font-[Syne] text-2xl font-bold text-[#0f1923]">Create account</h1>
    <p class="text-slate-400 text-sm">Fill in your details to get started</p>
  </div>

  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <div class="grid grid-cols-2 gap-4">
      <input type="text" name="first_name" placeholder="First name"
        class="px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:border-sky-400 outline-none">

      <input type="text" name="last_name" placeholder="Last name"
        class="px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:border-sky-400 outline-none">
    </div>

    <input type="text" name="username" placeholder="Username"
      class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:border-sky-400 outline-none">

    <input type="email" name="email" placeholder="Email"
      class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:border-sky-400 outline-none">

    <input type="password" name="password" placeholder="Password"
      class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:border-sky-400 outline-none">

    <input type="password" name="confirm_password" placeholder="Confirm password"
      class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:border-sky-400 outline-none">

    <button type="submit"
      class="w-full py-3 rounded-lg font-[Syne] font-semibold text-white
      bg-gradient-to-br from-[#0f1923] to-[#0d2137]
      hover:from-sky-400 hover:to-teal-400 transition">
      Create Account →
    </button>
  </form>

  <div class="text-center mt-5 text-sm text-slate-400">
    Already have an account?
    <a href="{% url 'login' %}" class="text-[#0f1923] font-semibold border-b border-sky-400 hover:text-sky-400">
      Sign In
    </a>
  </div>

</div>

</body>
</html>
