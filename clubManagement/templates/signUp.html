{% load static tailwind_tags %}
<!doctype html>
<html lang="en">
  <head>
    <title>Sign Up</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% tailwind_css %}
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
      <h1 class="text-2xl font-bold text-center mb-6">Create Account</h1>

      <form action="{% url 'login' %}">
        <div class="grid grid-cols-2 gap-3 mb-3">
          <input
            type="text"
            placeholder="First Name"
            class="px-3 py-2 border rounded-lg"
          />

          <input
            type="text"
            placeholder="Last Name"
            class="px-3 py-2 border rounded-lg"
          />
        </div>

        <input
          type="text"
          placeholder="Username"
          class="w-full px-3 py-2 border rounded-lg mb-3"
        />

        <input
          type="email"
          placeholder="Email Address"
          class="w-full px-3 py-2 border rounded-lg mb-3"
        />

        <input
          type="password"
          placeholder="Password"
          class="w-full px-3 py-2 border rounded-lg mb-3"
        />

        <input
          type="password"
          placeholder="Confirm Password"
          class="w-full px-3 py-2 border rounded-lg mb-5"
        />

        <button
          type="submit"
          class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600"
        >
          Sign Up
        </button>
      </form>

      <!-- NEW TEXT -->
      <p class="text-center text-sm text-gray-600 mt-4">
        Already have an account?
      </p>

      <!-- FOOTER LINK -->
      <div class="text-center mt-1">
        <a href="{% url 'login' %}" class="text-blue-500 hover:underline">
          Back to Login
        </a>
      </div>
    </div>
  </body>
</html>
